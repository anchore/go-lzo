name: "Bootstrap"

description: "Bootstrap all tools and dependencies"
inputs:
  bootstrap-apt-packages:
    description: "Space delimited list of tools to install via apt"
    default: "liblzo2-dev"

runs:
  using: "composite"
  steps:
    # setup checkout, go, go-make, binny, and cache go modules
    - uses: anchore/go-make/.github/actions/setup@383ef7852b8ae43a30f424896b52479186d2ea4d # v0.1.0

    - name: Install apt packages
      if: inputs.bootstrap-apt-packages != ''
      shell: bash
      run: |
        DEBIAN_FRONTEND=noninteractive sudo apt update && sudo -E apt install -y ${INPUTS_BOOTSTRAP_APT_PACKAGES}
      env:
        INPUTS_BOOTSTRAP_APT_PACKAGES: ${{ inputs.bootstrap-apt-packages }}
